name: terraform test

# Runs the variable-validation suite under tests/terraform/. See tests/terraform/README.md
# and #334 for context. The suite uses `override_data` to stub the connection-strings
# external Python data source, so plan-time variable validations can be exercised without
# touching real cloud providers.

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/*.tftest.hcl"
      - "templates/TEMPLATE_terraform.tfvars"
      - "scripts/installer/validation/**"
      - "scripts/installer/data_external/**"
      - "scripts/installer/utils/**"
      - "tests/datafiles/**"
      - "tests/terraform/**"
      - "Makefile"
      - ".github/workflows/terraform-test.yml"
  push:
    branches:
      - master
      - "release/v*"
      - "chore/v26-**" # Temporary: keep visibility while the stacked v26 work is in flight.
  workflow_dispatch:

jobs:
  terraform-test:
    name: terraform test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8
          terraform_wrapper: false

      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.61.0

      - name: tflint init
        run: tflint --init

      - name: tflint
        # Fail the job on any tflint warning or error (default behaviour:
        # exit 2 on issues found). TFLINT_CONFIG_FILE is set so child modules
        # walked by --recursive use the root .tflint.hcl ruleset (sub-dirs
        # don't auto-discover the root config).
        env:
          TFLINT_CONFIG_FILE: ${{ github.workspace }}/.tflint.hcl
        run: tflint --recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # NOTE: tests/requirements.txt is intentionally NOT installed here — it carries
      # pytest-suite deps (and at present a malformed line). The terraform-test path
      # only needs stdlib Python: generate_core_data.sh -> generate_testing_secrets.py
      # uses no third-party imports, and the data.external script is mocked via
      # override_data. If this changes, install only the specific deps required, not
      # the whole pytest fixture set.

      - name: Terraform init (modules only)
        # No backend, no providers refreshed — just enough to resolve module sources for
        # `terraform test`. Variable validations run during plan and don't need real
        # provider credentials thanks to the `override_data` blocks in the test files.
        run: terraform init -backend=false

      - name: Generate test fixtures
        env:
          # generate_core_data.sh respects this to skip writing real SSM parameters.
          CX_SKIP_SSM: "true"
        run: |
          mkdir -p tests/logs
          make generate_test_data

      - name: Run terraform test
        run: make terraform_test
